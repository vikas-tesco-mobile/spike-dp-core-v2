# yaml-language-server: $schema=https://www.schemastore.org/databricks-asset-bundles.json
#
# NOTE: In this tactical v2 variant, analysts CI stages dbt_project/ into the
# core bundle before deployment, so the dbt task runs from workspace files.
#
resources:
  jobs:
    revenue_assurance_dbt:
      name: v2_revenue_assurance_dbt
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - "dbt-databricks>=1.11.2"
      webhook_notifications:
        on_failure:
          - id: ${var.datahub_alert_slack_id}
      trigger:
        table_update:
          condition: ALL_UPDATED
          table_names:
            - "${var.catalog}.vmo2_revenue_assurance_silver.usage_root_cleaned"
            - "${var.catalog}.vmo2_revenue_assurance_silver.usage_charge_cleaned"
            - "${var.catalog}.vmo2_revenue_assurance_silver.usage_applied_offer_cleaned"
            - "${var.catalog}.vmo2_revenue_assurance_silver.usage_applied_bundle_cleaned"
            - "${var.catalog}.vmo2_revenue_assurance_silver.usage_applied_catalog_item_cleaned"
            - "${var.catalog}.vmo2_revenue_assurance_silver.usage_applied_tax_cleaned"
            - "${var.catalog}.vmo2_revenue_assurance_silver.usage_balance_update_cleaned"
            - "${var.catalog}.vmo2_revenue_assurance_silver.usage_quantity_cleaned"
      tasks:
        - task_key: load_revenue_assurance_dbt
          environment_key: default
          dbt_task:
            source: WORKSPACE
            project_directory: ${var.dbt_workspace_project_path}
            commands:
              - "dbt deps"
              - "dbt build -s +datahub.revenue_assurance_gold --target ${var.profile} --vars '{\"catalog\": \"${var.catalog}\"}'"
